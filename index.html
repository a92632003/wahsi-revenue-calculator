<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>哇喜行銷 — 營業額試算工具</title>
  <link href="https://fonts.googleapis.com/css2?family=Noto+Serif+TC:wght@900&family=Noto+Sans+TC:wght@400;500&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@latest/tabler-icons.min.css">
  <style>
    /* 所有樣式加 .wt 前綴，防止 WordPress 前台 CSS 覆蓋 */
    .wt, .wt *, .wt *::before, .wt *::after {
      box-sizing: border-box !important;
    }
    .wt {
      --blue: #c4dbe3; --blue-dark: #8fb8c5; --blue-bg: #edf5f8;
      --yellow: #ffd53b; --yellow-bright: #ffe75f;
      --dark: #3e3f3f; --gray1: #a1afbd; --gray2: #6e7374;
      --light: #f0f0f0; --white: #ffffff;
      font-family: 'Noto Sans TC', sans-serif !important;
      background: #fff;
      padding: 2rem 1.5rem 2.5rem;
      width: 100%;
      margin: 0;
    }

    /* header */
    .wt .hdr { display: flex !important; align-items: center !important; justify-content: space-between !important; margin: 0 0 2rem !important; padding: 0 0 1.25rem !important; border-bottom: 2px solid var(--blue) !important; border-top: none !important; border-left: none !important; border-right: none !important; }
    .wt .logo { height: 44px !important; width: auto !important; max-width: 200px !important; object-fit: contain !important; display: block !important; }
    .wt .hdr-right { text-align: right !important; }
    .wt .hdr-title { font-family: 'Noto Serif TC', serif !important; font-size: 22px !important; font-weight: 900 !important; color: var(--dark) !important; line-height: 1.2 !important; margin: 0 !important; }
    .wt .hdr-sub { font-size: 12px !important; color: var(--gray2) !important; margin: 3px 0 0 !important; }

    /* formula */
    .wt .formula { display: flex !important; align-items: center !important; gap: 8px !important; flex-wrap: wrap !important; margin: 0 0 2rem !important; background: var(--blue-bg) !important; border-radius: 12px !important; padding: 14px 18px !important; }
    .wt .formula-top, .wt .formula-bottom { display: contents !important; }
    .wt .f-tag { background: var(--blue) !important; color: var(--dark) !important; border-radius: 20px !important; padding: 4px 14px !important; font-size: 13px !important; font-family: 'Noto Sans TC', sans-serif !important; display: inline-block !important; margin: 0 !important; line-height: 1.5 !important; }
    .wt .f-tag.yl { background: var(--yellow) !important; }
    .wt .f-eq { font-size: 16px !important; color: var(--gray1) !important; line-height: 1 !important; }

    /* table header */
    .wt .tbl-head { display: grid !important; grid-template-columns: 1.5fr 1fr 1fr 1fr 34px !important; gap: 8px !important; padding: 0 0 8px !important; border-bottom: 1.5px solid var(--dark) !important; margin: 0 0 8px !important; }
    .wt .tbl-head span { font-size: 11px !important; color: var(--gray2) !important; letter-spacing: 0.06em !important; display: block !important; }
    .wt .tbl-head span:nth-child(n+2) { text-align: right !important; }

    /* rows */
    .wt .rows { display: flex !important; flex-direction: column !important; gap: 8px !important; margin: 0 0 10px !important; }
    .wt .srow { display: grid !important; grid-template-columns: 1.5fr 1fr 1fr 1fr 34px !important; gap: 8px !important; align-items: center !important; }
    .wt .srow > * { min-width: 0 !important; }

    /* inputs */
    .wt .finput {
      display: block !important;
      height: 48px !important;
      width: 100% !important;
      min-width: 0 !important;
      border: 1.5px solid #d0dde5 !important;
      border-radius: 10px !important;
      padding: 0 12px !important;
      font-size: 15px !important;
      font-family: 'Noto Sans TC', sans-serif !important;
      color: var(--dark) !important;
      background: #e8f2f6 !important;
      outline: none !important;
      box-shadow: none !important;
      transition: border-color .15s, background .15s !important;
      -webkit-appearance: none !important;
      appearance: none !important;
    }
    .wt .finput:focus { border-color: var(--blue-dark) !important; background: #fff !important; box-shadow: none !important; }
    .wt .finput.r { text-align: right !important; padding-right: 28px !important; }

    .wt .iw { position: relative !important; display: flex !important; align-items: center !important; min-width: 0 !important; }
    .wt .iw input { width: 100% !important; min-width: 0 !important; }
    .wt .iw .pu { position: absolute !important; right: 11px !important; font-size: 13px !important; color: var(--gray2) !important; pointer-events: none !important; top: 50% !important; transform: translateY(-50%) !important; }
    .wt .iw .pl { position: absolute !important; left: 11px !important; font-size: 13px !important; color: var(--gray2) !important; pointer-events: none !important; top: 50% !important; transform: translateY(-50%) !important; }
    .wt .iw.hasl input { padding-left: 24px !important; }

    /* buttons */
    .wt .del { width: 34px !important; height: 34px !important; border: 1.5px solid var(--light) !important; border-radius: 8px !important; background: transparent !important; cursor: pointer !important; display: flex !important; align-items: center !important; justify-content: center !important; color: var(--gray1) !important; font-size: 15px !important; flex-shrink: 0 !important; padding: 0 !important; box-shadow: none !important; }
    .wt .del:hover { border-color: #e24b4a !important; color: #e24b4a !important; }
    .wt .add-btn { display: flex !important; align-items: center !important; gap: 6px !important; border: 1.5px dashed var(--gray1) !important; border-radius: 8px !important; padding: 9px 16px !important; font-size: 13px !important; font-family: 'Noto Sans TC', sans-serif !important; color: var(--gray2) !important; background: transparent !important; cursor: pointer !important; margin: 8px 0 0 !important; box-shadow: none !important; }
    .wt .add-btn:hover { border-color: var(--dark) !important; color: var(--dark) !important; }

    .wt .div { border: none !important; border-top: 1.5px solid var(--light) !important; margin: 1.75rem 0 !important; }

    /* results */
    .wt .results { background: var(--dark) !important; border-radius: 16px !important; overflow: hidden !important; }
    .wt .res-row1 { display: grid !important; grid-template-columns: 1fr 1fr 1fr !important; border-bottom: 1px solid rgba(255,255,255,.08) !important; }
    .wt .res-row2 { display: grid !important; grid-template-columns: 1fr !important; }
    .wt .r-cell { padding: 1.25rem 1.25rem 1rem !important; border-right: 1px solid rgba(255,255,255,.08) !important; }
    .wt .r-cell:last-child { border-right: none !important; }
    .wt .r-cell.yl { background: var(--yellow-bright) !important; }
    .wt .r-lbl { font-size: 11px !important; letter-spacing: 0.08em !important; color: rgba(255,255,255,.45) !important; margin: 0 0 6px !important; display: block !important; }
    .wt .r-cell.yl .r-lbl { color: rgba(62,63,63,.55) !important; }
    .wt .r-note { font-size: 10px !important; color: rgba(255,255,255,.3) !important; margin: 3px 0 0 !important; display: block !important; }
    .wt .r-cell.yl .r-note { color: rgba(62,63,63,.4) !important; }
    .wt .r-val { font-family: 'Noto Serif TC', serif !important; font-size: 24px !important; font-weight: 900 !important; color: #fff !important; display: block !important; margin: 0 !important; }
    .wt .r-cell.yl .r-val { color: var(--dark) !important; }
    .wt .r-val.lg { font-size: 28px !important; }

    /* breakdown */
    .wt .bkd { padding: 1.25rem !important; }
    .wt .bkd-head { font-size: 11px !important; letter-spacing: 0.1em !important; color: rgba(255,255,255,.35) !important; margin: 0 0 12px !important; display: block !important; }
    .wt .bd-rows { display: flex !important; flex-direction: column !important; gap: 10px !important; }
    .wt .bd-row { display: grid !important; grid-template-columns: 110px 1fr 100px 42px !important; gap: 10px !important; align-items: center !important; }
    .wt .bd-name { font-size: 13px !important; color: rgba(255,255,255,.75) !important; overflow: hidden !important; text-overflow: ellipsis !important; white-space: nowrap !important; }
    .wt .bd-bar-bg { height: 4px !important; background: rgba(255,255,255,.1) !important; border-radius: 2px !important; overflow: hidden !important; }
    .wt .bd-bar { height: 100% !important; background: var(--yellow) !important; border-radius: 2px !important; transition: width .35s !important; }
    .wt .bd-amt { font-size: 13px !important; color: #fff !important; font-weight: 500 !important; text-align: right !important; }
    .wt .bd-pct { font-size: 11px !important; color: rgba(255,255,255,.35) !important; text-align: right !important; }

    /* ── 手機版 ── */
    @media (max-width: 600px) {
      .wt { padding: 1.25rem 1rem 2rem !important; }
      .wt .hdr-title { font-size: 17px !important; }
      .wt .tbl-head { display: none !important; }

      .wt .formula { flex-direction: column !important; align-items: flex-start !important; gap: 6px !important; padding: 12px 14px !important; }
      .wt .formula-top { display: flex !important; }
      .wt .formula-bottom { display: flex !important; align-items: center !important; gap: 6px !important; flex-wrap: nowrap !important; }

      .wt .srow {
        display: grid !important;
        grid-template-columns: 1fr 1fr 1fr 34px !important;
        grid-template-rows: auto auto !important;
        gap: 6px 8px !important;
        background: var(--blue-bg) !important;
        border-radius: 10px !important;
        padding: 12px !important;
      }
      .wt .srow > input[type="text"] { grid-column: 1 / 4 !important; grid-row: 1 !important; }
      .wt .srow > .del { grid-column: 4 !important; grid-row: 1 !important; align-self: center !important; }
      .wt .srow > .iw { grid-row: 2 !important; flex-direction: column !important; align-items: stretch !important; }
      .wt .srow > .iw:nth-child(2) { grid-column: 1 !important; }
      .wt .srow > .iw:nth-child(3) { grid-column: 2 !important; }
      .wt .srow > .iw:nth-child(4) { grid-column: 3 !important; }

      .wt .srow > .iw[data-label]::before {
        content: attr(data-label);
        display: block !important;
        font-size: 10px !important;
        color: var(--gray2) !important;
        margin: 0 0 3px !important;
        letter-spacing: 0.04em !important;
      }
      .wt .srow > .iw { position: relative !important; }
      .wt .srow > .iw .finput { font-size: 13px !important; padding-right: 22px !important; height: 40px !important; width: 100% !important; }
      .wt .srow > .iw.hasl .finput { padding-left: 18px !important; padding-right: 8px !important; }
      .wt .srow > .iw .pu { position: absolute !important; transform: none !important; top: 50% !important; bottom: auto !important; margin-top: 10px !important; right: 8px !important; }
      .wt .srow > .iw .pl { position: absolute !important; transform: none !important; top: 50% !important; bottom: auto !important; margin-top: 10px !important; left: 8px !important; }

      .wt .res-row1 { grid-template-columns: 1fr 1fr !important; }
      .wt .res-row1 .r-cell:nth-child(3) { grid-column: 1 / -1 !important; border-top: 1px solid rgba(255,255,255,.08) !important; border-right: none !important; }
      .wt .r-cell { padding: 0.875rem 1rem !important; }
      .wt .r-val { font-size: 18px !important; }
      .wt .r-val.lg { font-size: 20px !important; }
      .wt .bd-row { grid-template-columns: 70px 1fr 78px 32px !important; gap: 6px !important; }
      .wt .bd-amt { font-size: 12px !important; }
      .wt .bd-pct { font-size: 10px !important; }
    }
  </style>
</head>
<body>
  <div class="wt">
    <div class="hdr">
      <img class="logo" src="https://woow99.site-now.app/wp-content/uploads/2026/06/snimgIK6nkl.webp" alt="哇喜行銷 logo">
      <div class="hdr-right">
        <div class="hdr-title">營業額試算工具</div>
        <div class="hdr-sub">Business Revenue Calculator</div>
      </div>
    </div>

    <div class="formula">
      <div class="formula-top">
        <span class="f-tag yl">營業額</span>
      </div>
      <div class="formula-bottom">
        <span class="f-eq">=</span>
        <span class="f-tag">流量</span>
        <span class="f-eq">×</span>
        <span class="f-tag">轉換率</span>
        <span class="f-eq">×</span>
        <span class="f-tag">客單價</span>
      </div>
    </div>

    <div class="tbl-head">
      <span>流量來源</span>
      <span>每月流量（人）</span>
      <span>轉換率（%）</span>
      <span>客單價（NT$）</span>
      <span></span>
    </div>
    <div class="rows" id="rows"></div>
    <button class="add-btn" id="addBtn">
      <i class="ti ti-plus"></i> 新增來源
    </button>

    <hr class="div">

    <div class="results">
      <div class="res-row1">
        <div class="r-cell">
          <div class="r-lbl">總流量</div>
          <div class="r-val" id="rT">0</div>
        </div>
        <div class="r-cell">
          <div class="r-lbl">預估成交數</div>
          <div class="r-val" id="rC">0</div>
        </div>
        <div class="r-cell">
          <div class="r-lbl">平均客單價</div>
          <div class="r-val" id="rA">NT$0</div>
          <div class="r-note">月營業額 ÷ 成交數</div>
        </div>
      </div>
      <div class="res-row2">
        <div class="r-cell yl">
          <div class="r-lbl">預估月營業額</div>
          <div class="r-val lg" id="rM">NT$0</div>
        </div>
      </div>
      <div class="bkd">
        <div class="bkd-head">各來源貢獻</div>
        <div class="bd-rows" id="bkd"></div>
      </div>
    </div>
  </div>

  <script>
    const defs = [
      { name: '親友介紹', traffic: 20, conv: 10, price: 2500 },
      { name: '搜尋流量', traffic: 300, conv: 2, price: 2000 },
      { name: '社群流量', traffic: 300, conv: 2, price: 1500 },
      { name: '廣告流量', traffic: 1000, conv: 1, price: 2000 },
      { name: '老客人', traffic: 100, conv: 30, price: 3000 },
    ];
    let srcs = defs.map((s, i) => ({ id: i, ...s }));
    let nid = srcs.length;
    const fmt = n => Math.round(n).toLocaleString('zh-TW');

    function renderRows() {
      const el = document.getElementById('rows');
      el.innerHTML = '';
      srcs.forEach(s => {
        const d = document.createElement('div');
        d.className = 'srow';
        d.innerHTML = `
          <input class="finput" type="text" value="${s.name}" placeholder="來源名稱" data-id="${s.id}" data-f="name">
          <div class="iw" data-label="每月流量">
            <input class="finput r" type="number" value="${s.traffic}" min="0" step="1" data-id="${s.id}" data-f="traffic">
            <span class="pu">人</span>
          </div>
          <div class="iw" data-label="轉換率">
            <input class="finput r" type="number" value="${s.conv}" min="0" max="100" step="0.1" data-id="${s.id}" data-f="conv">
            <span class="pu">%</span>
          </div>
          <div class="iw hasl" data-label="客單價">
            <span class="pl">$</span>
            <input class="finput r" type="number" value="${s.price}" min="0" step="100" data-id="${s.id}" data-f="price">
          </div>
          <button class="del" data-id="${s.id}" aria-label="移除"><i class="ti ti-x" style="pointer-events:none"></i></button>
        `;
        el.appendChild(d);
      });
    }

    function calc() {
      const tt = srcs.reduce((a, s) => a + (s.traffic || 0), 0);
      const tc = srcs.reduce((a, s) => a + (s.traffic || 0) * ((s.conv || 0) / 100), 0);
      const tr = srcs.reduce((a, s) => a + (s.traffic || 0) * ((s.conv || 0) / 100) * (s.price || 0), 0);
      const avg = tc > 0 ? tr / tc : 0;
      document.getElementById('rT').textContent = fmt(tt);
      document.getElementById('rC').textContent = fmt(tc);
      document.getElementById('rA').textContent = 'NT$' + fmt(avg);
      document.getElementById('rM').textContent = 'NT$' + fmt(tr);
      const bkd = document.getElementById('bkd');
      bkd.innerHTML = srcs.map(s => {
        const rev = (s.traffic || 0) * ((s.conv || 0) / 100) * (s.price || 0);
        const pct = tr > 0 ? (rev / tr * 100) : 0;
        return `<div class="bd-row">
          <span class="bd-name" title="${s.name || '（未命名）'}">${s.name || '（未命名）'}</span>
          <div class="bd-bar-bg"><div class="bd-bar" style="width:${pct.toFixed(1)}%"></div></div>
          <span class="bd-amt">NT$${fmt(rev)}</span>
          <span class="bd-pct">${pct.toFixed(0)}%</span>
        </div>`;
      }).join('');
    }

    document.getElementById('rows').addEventListener('input', e => {
      const id = parseInt(e.target.dataset.id), f = e.target.dataset.f;
      if (!f) return;
      const s = srcs.find(x => x.id === id);
      if (!s) return;
      s[f] = f === 'name' ? e.target.value : (parseFloat(e.target.value) || 0);
      calc();
    });
    document.getElementById('rows').addEventListener('click', e => {
      const b = e.target.closest('.del');
      if (!b) return;
      srcs = srcs.filter(s => s.id !== parseInt(b.dataset.id));
      renderRows(); calc();
    });
    document.getElementById('addBtn').addEventListener('click', () => {
      srcs.push({ id: nid++, name: '', traffic: 0, conv: 3, price: 1000 });
      renderRows(); calc();
      const last = document.querySelectorAll('#rows .srow');
      if (last.length) last[last.length - 1].querySelector('input[type="text"]').focus();
    });

    renderRows(); calc();
  </script>
</body>
</html>
