<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>哇喜行銷 — 營業額試算工具</title>
  <link href="https://fonts.googleapis.com/css2?family=Noto+Serif+TC:wght@900&family=Noto+Sans+TC:wght@400;500&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@latest/tabler-icons.min.css">
  <style>
    :root {
      --blue: #c4dbe3; --blue-dark: #8fb8c5; --blue-bg: #edf5f8; --blue-input: #e8f2f6;
      --yellow: #ffd53b; --yellow-bright: #ffe75f;
      --dark: #3e3f3f; --gray1: #a1afbd; --gray2: #6e7374;
      --light: #f0f0f0; --white: #ffffff;
    }
    * { box-sizing: border-box; margin: 0; padding: 0; }

    .wt {
      font-family: 'Noto Sans TC', sans-serif;
      background: #fff;
      padding: 2rem 1.5rem 2.5rem;
      width: 100%;
      color: var(--dark);
      line-height: 1.6;
    }

    /* header */
    .wt .hdr { display: flex; align-items: center; justify-content: space-between; margin-bottom: 2rem; padding-bottom: 1.25rem; border-bottom: 2px solid var(--blue); }
    .wt .logo { height: 44px; width: auto; max-width: 200px; object-fit: contain; display: block; }
    .wt .hdr-right { text-align: right; }
    .wt .hdr-title { font-family: 'Noto Serif TC', serif; font-size: 22px; font-weight: 900; color: var(--dark); line-height: 1.2; }
    .wt .hdr-sub { font-size: 12px; color: var(--gray2); margin-top: 3px; }

    /* formula */
    .wt .formula { display: flex; align-items: center; gap: 8px; flex-wrap: wrap; margin-bottom: 2rem; background: var(--blue-bg); border-radius: 12px; padding: 14px 18px; }
    .wt .formula-top, .wt .formula-bottom { display: contents; }
    .wt .f-tag { background: var(--blue); color: var(--dark); border-radius: 20px; padding: 4px 14px; font-size: 13px; display: inline-block; line-height: 1.5; }
    .wt .f-tag.yl { background: var(--yellow); }
    .wt .f-eq { font-size: 16px; color: var(--gray1); }

    /* table header */
    .wt .tbl-head { display: grid; grid-template-columns: 1.5fr 1fr 1fr 1fr 34px; gap: 8px; padding: 0 0 8px; border-bottom: 1.5px solid var(--dark); margin-bottom: 8px; }
    .wt .tbl-head span { font-size: 11px; color: var(--gray2); letter-spacing: 0.06em; display: block; }
    .wt .tbl-head span:nth-child(n+2) { text-align: right; }

    /* rows */
    .wt .rows { display: flex; flex-direction: column; gap: 8px; margin-bottom: 10px; }
    .wt .srow { display: grid; grid-template-columns: 1.5fr 1fr 1fr 1fr 34px; gap: 8px; align-items: center; }
    .wt .srow > * { min-width: 0; }

    /* inputs — 用元素選擇器，不用 class，避免 WordPress 覆蓋 */
    .wt input[type="text"],
    .wt input[type="number"] {
      display: block;
      height: 48px;
      width: 100%;
      min-width: 0;
      border: 1.5px solid #d0dde5;
      border-radius: 10px;
      padding: 0 12px;
      font-size: 15px;
      font-family: 'Noto Sans TC', sans-serif;
      color: var(--dark);
      background: var(--blue-input);
      outline: none;
      box-shadow: none;
      -webkit-appearance: none;
      appearance: none;
      transition: border-color .15s, background .15s;
    }
    .wt input[type="text"]:focus,
    .wt input[type="number"]:focus {
      border-color: var(--blue-dark);
      background: #fff;
      box-shadow: none;
    }
    .wt input[type="number"] { text-align: right; padding-right: 28px; }
    .wt input::-webkit-outer-spin-button,
    .wt input::-webkit-inner-spin-button { -webkit-appearance: none; margin: 0; }
    .wt input[type="text"] { text-align: left; padding-right: 12px; }

    /* input wrapper with unit symbol */
    .wt .iw { position: relative; display: flex; align-items: center; min-width: 0; }
    .wt .iw input { width: 100%; min-width: 0; }
    .wt .iw .pu { position: absolute; right: 11px; top: 50%; transform: translateY(-50%); font-size: 13px; color: var(--gray2); pointer-events: none; }
    .wt .iw .pl { position: absolute; left: 11px; top: 50%; transform: translateY(-50%); font-size: 13px; color: var(--gray2); pointer-events: none; }
    .wt .iw.hasl input[type="number"] { padding-left: 24px; }

    /* buttons */
    .wt .del { width: 34px; height: 34px; border: 1.5px solid var(--light); border-radius: 8px; background: transparent; cursor: pointer; display: flex; align-items: center; justify-content: center; color: var(--gray1); font-size: 15px; flex-shrink: 0; padding: 0; box-shadow: none; }
    .wt .del:hover { border-color: #e24b4a; color: #e24b4a; }
    .wt .add-btn { display: flex; align-items: center; gap: 6px; border: 1.5px dashed var(--gray1); border-radius: 8px; padding: 9px 16px; font-size: 13px; font-family: 'Noto Sans TC', sans-serif; color: var(--gray2); background: transparent; cursor: pointer; margin-top: 8px; box-shadow: none; }
    .wt .add-btn:hover { border-color: var(--dark); color: var(--dark); }
    .wt hr.div { border: none; border-top: 1.5px solid var(--light); margin: 1.75rem 0; }

    /* results */
    .wt .results { background: var(--dark); border-radius: 16px; overflow: hidden; }
    .wt .res-row1 { display: grid; grid-template-columns: 1fr 1fr 1fr; border-bottom: 1px solid rgba(255,255,255,.08); }
    .wt .res-row2 { display: grid; grid-template-columns: 1fr; }
    .wt .r-cell { padding: 1.25rem 1.25rem 1rem; border-right: 1px solid rgba(255,255,255,.08); }
    .wt .r-cell:last-child { border-right: none; }
    .wt .r-cell.yl { background: var(--yellow-bright); }
    .wt .r-lbl { font-size: 11px; letter-spacing: 0.08em; color: rgba(255,255,255,.45); margin-bottom: 6px; display: block; }
    .wt .r-cell.yl .r-lbl { color: rgba(62,63,63,.55); }
    .wt .r-note { font-size: 10px; color: rgba(255,255,255,.3); margin-top: 3px; display: block; }
    .wt .r-cell.yl .r-note { color: rgba(62,63,63,.4); }
    .wt .r-val { font-family: 'Noto Serif TC', serif; font-size: 24px; font-weight: 900; color: #fff; display: block; }
    .wt .r-cell.yl .r-val { color: var(--dark); }
    .wt .r-val.lg { font-size: 28px; }

    /* breakdown */
    .wt .bkd { padding: 1.25rem; }
    .wt .bkd-head { font-size: 11px; letter-spacing: 0.1em; color: rgba(255,255,255,.35); margin-bottom: 12px; display: block; }
    .wt .bd-rows { display: flex; flex-direction: column; gap: 10px; }
    .wt .bd-row { display: grid; grid-template-columns: 110px 1fr 100px 42px; gap: 10px; align-items: center; }
    .wt .bd-name { font-size: 13px; color: rgba(255,255,255,.75); overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
    .wt .bd-bar-bg { height: 4px; background: rgba(255,255,255,.1); border-radius: 2px; overflow: hidden; }
    .wt .bd-bar { height: 100%; background: var(--yellow); border-radius: 2px; transition: width .35s; }
    .wt .bd-amt { font-size: 13px; color: #fff; font-weight: 500; text-align: right; }
    .wt .bd-pct { font-size: 11px; color: rgba(255,255,255,.35); text-align: right; }

    /* ── 手機版 ── */
    @media (max-width: 600px) {
      .wt { padding: 1.25rem 1rem 2rem; }
      .wt .hdr-title { font-size: 17px; }
      .wt .tbl-head { display: none; }

      .wt .formula { flex-direction: column; align-items: flex-start; gap: 6px; padding: 12px 14px; }
      .wt .formula-top { display: flex; }
      .wt .formula-bottom { display: flex; align-items: center; gap: 6px; }

      .wt .srow {
        display: grid;
        grid-template-columns: 1fr 1fr 1fr 34px;
        grid-template-rows: auto auto;
        gap: 6px 8px;
        background: var(--blue-bg);
        border-radius: 10px;
        padding: 12px;
      }
      .wt .srow > input[type="text"] { grid-column: 1 / 4; grid-row: 1; }
      .wt .srow > .del { grid-column: 4; grid-row: 1; align-self: center; }
      .wt .srow > .iw { grid-row: 2; flex-direction: column; align-items: stretch; position: relative; }
      .wt .srow > .iw:nth-child(2) { grid-column: 1; }
      .wt .srow > .iw:nth-child(3) { grid-column: 2; }
      .wt .srow > .iw:nth-child(4) { grid-column: 3; }

      .wt .srow > .iw[data-label]::before {
        content: attr(data-label);
        display: block;
        font-size: 10px;
        color: var(--gray2);
        margin-bottom: 3px;
        letter-spacing: 0.04em;
      }
      .wt .srow > .iw input[type="number"] { font-size: 13px; padding-right: 22px; height: 40px; width: 100%; }
      .wt .srow > .iw.hasl input[type="number"] { padding-left: 18px; padding-right: 8px; }
      .wt .srow > .iw .pu { top: auto; bottom: 10px; transform: none; right: 7px; }
      .wt .srow > .iw .pl { top: auto; bottom: 10px; transform: none; left: 7px; }

      .wt .res-row1 { grid-template-columns: 1fr 1fr; }
      .wt .res-row1 .r-cell:nth-child(3) { grid-column: 1 / -1; border-top: 1px solid rgba(255,255,255,.08); border-right: none; }
      .wt .r-cell { padding: 0.875rem 1rem; }
      .wt .r-val { font-size: 18px; }
      .wt .r-val.lg { font-size: 20px; }
      .wt .bd-row { grid-template-columns: 70px 1fr 78px 32px; gap: 6px; }
      .wt .bd-amt { font-size: 12px; }
      .wt .bd-pct { font-size: 10px; }
    }
  </style>
</head>
<body>
  <div class="wt">
    <div class="hdr">
      <img class="logo" src="https://woow99.site-now.app/wp-content/uploads/2026/06/snimgIK6nkl.webp" alt="哇喜行銷 logo">
      <div class="hdr-right">
        <div class="hdr-title">營業額試算工具</div>
        <div class="hdr-sub">Business Revenue Calculator</div>
      </div>
    </div>

    <div class="formula">
      <div class="formula-top"><span class="f-tag yl">營業額</span></div>
      <div class="formula-bottom">
        <span class="f-eq">=</span>
        <span class="f-tag">流量</span>
        <span class="f-eq">×</span>
        <span class="f-tag">轉換率</span>
        <span class="f-eq">×</span>
        <span class="f-tag">客單價</span>
      </div>
    </div>

    <div class="tbl-head">
      <span>流量來源</span>
      <span>每月流量（人）</span>
      <span>轉換率（%）</span>
      <span>客單價（NT$）</span>
      <span></span>
    </div>
    <div class="rows" id="rows"></div>
    <button class="add-btn" id="addBtn"><i class="ti ti-plus"></i> 新增來源</button>

    <hr class="div">

    <div class="results">
      <div class="res-row1">
        <div class="r-cell">
          <span class="r-lbl">總流量</span>
          <span class="r-val" id="rT">0</span>
        </div>
        <div class="r-cell">
          <span class="r-lbl">預估成交數</span>
          <span class="r-val" id="rC">0</span>
        </div>
        <div class="r-cell">
          <span class="r-lbl">平均客單價</span>
          <span class="r-val" id="rA">NT$0</span>
          <span class="r-note">月營業額 ÷ 成交數</span>
        </div>
      </div>
      <div class="res-row2">
        <div class="r-cell yl">
          <span class="r-lbl">預估月營業額</span>
          <span class="r-val lg" id="rM">NT$0</span>
        </div>
      </div>
      <div class="bkd">
        <span class="bkd-head">各來源貢獻</span>
        <div class="bd-rows" id="bkd"></div>
      </div>
    </div>
  </div>

  <script>
    const defs = [
      { name: '親友介紹', traffic: 20, conv: 10, price: 2500 },
      { name: '搜尋流量', traffic: 300, conv: 2, price: 2000 },
      { name: '社群流量', traffic: 300, conv: 2, price: 1500 },
      { name: '廣告流量', traffic: 1000, conv: 1, price: 2000 },
      { name: '老客人', traffic: 100, conv: 30, price: 3000 },
    ];
    let srcs = defs.map((s, i) => ({ id: i, ...s }));
    let nid = srcs.length;
    const fmt = n => Math.round(n).toLocaleString('zh-TW');

    function renderRows() {
      const el = document.getElementById('rows');
      el.innerHTML = '';
      srcs.forEach(s => {
        const d = document.createElement('div');
        d.className = 'srow';
        d.innerHTML = `
          <input type="text" value="${s.name}" placeholder="來源名稱" data-id="${s.id}" data-f="name">
          <div class="iw" data-label="每月流量">
            <input type="number" value="${s.traffic}" min="0" step="1" data-id="${s.id}" data-f="traffic">
            <span class="pu">人</span>
          </div>
          <div class="iw" data-label="轉換率">
            <input type="number" value="${s.conv}" min="0" max="100" step="0.1" data-id="${s.id}" data-f="conv">
            <span class="pu">%</span>
          </div>
          <div class="iw hasl" data-label="客單價">
            <span class="pl">$</span>
            <input type="number" value="${s.price}" min="0" step="100" data-id="${s.id}" data-f="price">
          </div>
          <button class="del" data-id="${s.id}" aria-label="移除"><i class="ti ti-x" style="pointer-events:none"></i></button>
        `;
        el.appendChild(d);
      });
    }

    function calc() {
      const tt = srcs.reduce((a, s) => a + (s.traffic || 0), 0);
      const tc = srcs.reduce((a, s) => a + (s.traffic || 0) * ((s.conv || 0) / 100), 0);
      const tr = srcs.reduce((a, s) => a + (s.traffic || 0) * ((s.conv || 0) / 100) * (s.price || 0), 0);
      const avg = tc > 0 ? tr / tc : 0;
      document.getElementById('rT').textContent = fmt(tt);
      document.getElementById('rC').textContent = fmt(tc);
      document.getElementById('rA').textContent = 'NT$' + fmt(avg);
      document.getElementById('rM').textContent = 'NT$' + fmt(tr);
      const bkd = document.getElementById('bkd');
      bkd.innerHTML = srcs.map(s => {
        const rev = (s.traffic || 0) * ((s.conv || 0) / 100) * (s.price || 0);
        const pct = tr > 0 ? (rev / tr * 100) : 0;
        return `<div class="bd-row">
          <span class="bd-name" title="${s.name || '（未命名）'}">${s.name || '（未命名）'}</span>
          <div class="bd-bar-bg"><div class="bd-bar" style="width:${pct.toFixed(1)}%"></div></div>
          <span class="bd-amt">NT$${fmt(rev)}</span>
          <span class="bd-pct">${pct.toFixed(0)}%</span>
        </div>`;
      }).join('');
    }

    document.getElementById('rows').addEventListener('input', e => {
      const id = parseInt(e.target.dataset.id), f = e.target.dataset.f;
      if (!f) return;
      const s = srcs.find(x => x.id === id);
      if (!s) return;
      s[f] = f === 'name' ? e.target.value : (parseFloat(e.target.value) || 0);
      calc();
    });
    document.getElementById('rows').addEventListener('click', e => {
      const b = e.target.closest('.del');
      if (!b) return;
      srcs = srcs.filter(s => s.id !== parseInt(b.dataset.id));
      renderRows(); calc();
    });
    document.getElementById('addBtn').addEventListener('click', () => {
      srcs.push({ id: nid++, name: '', traffic: 0, conv: 3, price: 1000 });
      renderRows(); calc();
      const last = document.querySelectorAll('#rows .srow');
      if (last.length) last[last.length - 1].querySelector('input[type="text"]').focus();
    });

    renderRows(); calc();
  </script>
</body>
</html>
